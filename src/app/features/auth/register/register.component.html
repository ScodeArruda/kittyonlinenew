<div class="cadastro-container">
    <div class="auth-card">
        <h1>Cadastro</h1>
        <form *ngIf="!isLoading" [formGroup]="registerForm" (ngSubmit)="registerUser()">
            <label for="nome">Nome</label>
            <input type="text" id="nome" formControlName="nome" placeholder="Digite seu nome" />

            <label for="sobrenome">Sobrenome</label>
            <input type="text" id="sobrenome" formControlName="sobrenome" placeholder="Digite seu sobrenome" />

            <label for="email">Email</label>
            <input type="email" id="email" formControlName="email" placeholder="Digite seu e-mail" />

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" formControlName="cpf" placeholder="Digite seu CPF" mask="000.000.000-00" />

            <label for="password">Senha</label>
            <input type="password" id="password" formControlName="password" placeholder="Digite sua senha" />

            <!-- Checkbox para aceitar os termos de uso -->
            <label class="checkbox-label">
                <input type="checkbox" formControlName="termoAceito" />
                Aceito os
                <a href="/termo" target="_blank">Termos</a>
            </label>


            <button type="submit"
                [disabled]="registerForm.invalid || !registerForm.get('termoAceito')?.value">Cadastrar</button>
        </form>

        <!-- Loading spinner -->
        <div *ngIf="isLoading" class="loading-spinner">
            <div class="spinner"></div>
            <p>Carregando...</p>
        </div>
    </div>
</div>
