<div class="login-container">
    <div class="auth-card">
        <h1>Login</h1>
        <form [formGroup]="loginForm" (ngSubmit)="login()">
            <label for="email">Email</label>
            <input type="email" id="email" formControlName="email" placeholder="Digite seu e-mail" />

            <label for="password">Senha</label>
            <input type="password" id="password" formControlName="password" placeholder="Digite sua senha" />

            <button type="submit" [disabled]="loginForm.invalid">Entrar</button>
            <!-- google-login.component.html -->
            <button (click)="loginWithGoogle()" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Google.png" alt="Google logo"
                    class="google-logo" />
                Continuar com Google
            </button>

        </form>
    </div>
</div>
